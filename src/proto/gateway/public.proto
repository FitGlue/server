syntax = "proto3";

package fitglue.gateway;

import "google/api/annotations.proto";

// Shared model types
import "models/plugin/manifest.proto";

import "models/activity/uploaded.proto";

option go_package = "github.com/fitglue/server/src/go/pkg/types/pb/gateway";

// PublicGatewayService describes the unauthenticated REST API surface
// served by api-public at /api/public/*.
//
// No authentication required. Used by marketing pages, Skier builds,
// and public showcase profile pages.
service PublicGatewayService {

  // ===================== Registry =====================
  rpc GetPluginRegistry(PublicEmptyRequest) returns (fitglue.models.plugin.PluginRegistryResponse) {
    option (google.api.http) = {
      get: "/registry"
    };
  }
  rpc ListPlugins(ListPluginsPublicRequest) returns (ListPluginsPublicResponse) {
    option (google.api.http) = {
      get: "/registry/plugins"
    };
  }
  rpc GetPlugin(GetPluginPublicRequest) returns (fitglue.models.plugin.PluginManifest) {
    option (google.api.http) = {
      get: "/registry/plugins/{id}"
    };
  }
  rpc ListCategories(PublicEmptyRequest) returns (ListCategoriesPublicResponse) {
    option (google.api.http) = {
      get: "/registry/categories"
    };
  }
  rpc ListSources(PublicEmptyRequest) returns (ListSourcesPublicResponse) {
    option (google.api.http) = {
      get: "/registry/sources"
    };
  }

  // ===================== Public Showcase =====================
  rpc GetPublicShowcase(GetPublicShowcaseRequest) returns (fitglue.models.activity.ShowcasedActivity) {
    option (google.api.http) = {
      get: "/showcase/{id}"
    };
  }
  rpc GetPublicShowcaseProfile(GetPublicShowcaseProfileRequest) returns (GetPublicShowcaseProfileResponse) {
    option (google.api.http) = {
      get: "/showcase/profile/{slug}"
    };
  }
}

// =====================================================================
// Request/Response messages
// =====================================================================

message PublicEmptyRequest {}

// Registry
message ListPluginsPublicRequest {
  string category = 1; // optional query param
}
message ListPluginsPublicResponse {
  repeated fitglue.models.plugin.PluginManifest plugins = 1;
}
message GetPluginPublicRequest {
  string id = 1;
}
message ListCategoriesPublicResponse {
  repeated string categories = 1;
}
message ListSourcesPublicResponse {
  repeated fitglue.models.plugin.PluginManifest sources = 1;
}

// Showcase
message GetPublicShowcaseRequest {
  string id = 1;
}
message GetPublicShowcaseProfileRequest {
  string slug = 1;
  int32 page = 2; // optional query param
}
message GetPublicShowcaseProfileResponse {
  fitglue.models.activity.ShowcaseProfile profile = 1;
  repeated fitglue.models.activity.ShowcasedActivity showcases = 2;
  int32 total_pages = 3;
  int32 current_page = 4;
}
