syntax = "proto3";

package fitglue.models.activity;

import "google/protobuf/timestamp.proto";
import "models/activity/source.proto";

option go_package = "github.com/fitglue/server/src/go/pkg/types/pb/models/activity";

message StandardizedActivity {
  ActivitySource source = 1;      
  string external_id = 2; 
  string user_id = 3;

  google.protobuf.Timestamp start_time = 4;
  string name = 5;        
  ActivityType type = 6;  

  repeated Session sessions = 7;

  string description = 8; 
  repeated string tags = 9;
  string notes = 10;

  repeated TimeMarker time_markers = 11;
  optional WorkoutDefinition workout = 12;
}

message TimeMarker {
  google.protobuf.Timestamp timestamp = 1;
  string label = 2;       
  string marker_type = 3; 
}

message Session {
  google.protobuf.Timestamp start_time = 1;
  double total_elapsed_time = 2; 
  double total_distance = 3;     
  repeated Lap laps = 4;
  repeated StrengthSet strength_sets = 5;

  optional double total_calories = 6;
  optional int32 avg_heart_rate = 7;
  optional int32 max_heart_rate = 8;
}

message Lap {
  google.protobuf.Timestamp start_time = 1;
  double total_elapsed_time = 2; 
  double total_distance = 3;     
  repeated Record records = 4;
  string exercise_name = 5;      
  string intensity = 6;          
}

message Record {
  google.protobuf.Timestamp timestamp = 1;

  int32 heart_rate = 2;     
  int32 power = 3;          
  int32 cadence = 4;        
  double speed = 5;         
  double altitude = 6;      

  double position_lat = 7;
  double position_long = 8;

  optional int32 ground_contact_time = 9;   
  optional int32 vertical_oscillation = 10; 
  optional int32 vertical_ratio = 11;       
  optional double step_length = 12;         
  double distance = 13;                     // Cumulative distance in meters from activity start
}

message StrengthSet {
  string exercise_name = 1; 
  int32 reps = 2;
  double weight_kg = 3;
  google.protobuf.Timestamp start_time = 4;
  int32 duration_seconds = 5;
  string notes = 6;

  string superset_id = 7; 

  MuscleGroup primary_muscle_group = 8;
  repeated MuscleGroup secondary_muscle_groups = 9;

  double distance_meters = 10;
  string set_type = 11;
}

enum MuscleGroup {
  MUSCLE_GROUP_UNSPECIFIED = 0;
  MUSCLE_GROUP_ABDOMINALS = 1;
  MUSCLE_GROUP_SHOULDERS = 2;
  MUSCLE_GROUP_BICEPS = 3;
  MUSCLE_GROUP_TRICEPS = 4;
  MUSCLE_GROUP_FOREARMS = 5;
  MUSCLE_GROUP_QUADRICEPS = 6;
  MUSCLE_GROUP_HAMSTRINGS = 7;
  MUSCLE_GROUP_CALVES = 8;
  MUSCLE_GROUP_GLUTES = 9;
  MUSCLE_GROUP_ABDUCTORS = 10;
  MUSCLE_GROUP_ADDUCTORS = 11;
  MUSCLE_GROUP_LATS = 12;
  MUSCLE_GROUP_UPPER_BACK = 13;
  MUSCLE_GROUP_TRAPS = 14;
  MUSCLE_GROUP_LOWER_BACK = 15;
  MUSCLE_GROUP_CHEST = 16;
  MUSCLE_GROUP_CARDIO = 17;
  MUSCLE_GROUP_NECK = 18;
  MUSCLE_GROUP_FULL_BODY = 19;
  MUSCLE_GROUP_OTHER = 20;
}

message WorkoutDefinition {
  string name = 1;                    
  repeated WorkoutStep steps = 2;
}

message WorkoutStep {
  string intensity = 1;      
  string duration_type = 2;  
  uint32 duration_value = 3; 
  string target_type = 4;    
  uint32 target_low = 5;
  uint32 target_high = 6;
}
