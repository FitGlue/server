syntax = "proto3";

package fitglue.models.user;

import "google/protobuf/timestamp.proto";
import "models/user/profile.proto";

option go_package = "github.com/fitglue/server/src/go/pkg/types/pb/models/user";

// SubscriptionState tracks the user's billing info, decoupled from core profile.
message SubscriptionState {
  string user_id = 1;
  
  // Stripe customer ID for billing
  string stripe_customer_id = 2;
  string stripe_subscription_id = 3;
  
  // Athlete trial end date (null = no trial)
  google.protobuf.Timestamp trial_ends_at = 4;
  
  // The actual purchased tier (free users won't have this record or it will be free)
  UserTier subscription_tier = 5;
  
  google.protobuf.Timestamp current_period_start = 6;
  google.protobuf.Timestamp current_period_end = 7;
  
  bool cancel_at_period_end = 8;
  string status = 9; // e.g. "active", "past_due", "canceled"
}
