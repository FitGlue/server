syntax = "proto3";

package fitglue.services.activity;

import "google/protobuf/empty.proto";
import "google/api/annotations.proto";
import "models/activity/standardized.proto";
import "models/activity/uploaded.proto";

option go_package = "github.com/fitglue/server/src/go/pkg/types/pb/services/activity";

service ActivityService {
  rpc GetActivity(GetActivityRequest) returns (fitglue.models.activity.StandardizedActivity) {
    option (google.api.http) = {
      get: "/v2/users/{user_id}/activities/{activity_id}"
    };
  }
  rpc ListActivities(ListActivitiesRequest) returns (ListActivitiesResponse) {
    option (google.api.http) = {
      get: "/v2/users/{user_id}/activities"
    };
  }
  rpc DeleteActivity(DeleteActivityRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v2/users/{user_id}/activities/{activity_id}"
    };
  }
  
  rpc GetShowcase(GetShowcaseRequest) returns (fitglue.models.activity.ShowcasedActivity) {
    option (google.api.http) = {
      get: "/v2/users/{user_id}/showcases/{showcase_id}"
    };
  }
  rpc ListShowcases(ListShowcasesRequest) returns (ListShowcasesResponse) {
    option (google.api.http) = {
      get: "/v2/users/{user_id}/showcases"
    };
  }
  rpc CreateShowcase(CreateShowcaseRequest) returns (fitglue.models.activity.ShowcasedActivity) {
    option (google.api.http) = {
      post: "/v2/users/{user_id}/showcases"
      body: "showcase"
    };
  }
  rpc UpdateShowcase(UpdateShowcaseRequest) returns (fitglue.models.activity.ShowcasedActivity) {
    option (google.api.http) = {
      patch: "/v2/users/{user_id}/showcases/{showcase_id}"
      body: "showcase"
    };
  }
  rpc DeleteShowcase(DeleteShowcaseRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v2/users/{user_id}/showcases/{showcase_id}"
    };
  }
  
  rpc ExportData(ExportDataRequest) returns (ExportDataResponse) {
    option (google.api.http) = {
      post: "/v2/users/{user_id}/export-data"
      body: "*"
    };
  }
  rpc ParseFitFile(ParseFitFileRequest) returns (fitglue.models.activity.StandardizedActivity) {
    option (google.api.http) = {
      post: "/v2/users/{user_id}/parse-fit"
      body: "*"
    };
  }
  rpc GetShowcasePreferences(GetShowcasePreferencesRequest) returns (fitglue.models.activity.ShowcaseProfile) {
    option (google.api.http) = {
      get: "/v2/users/{user_id}/showcase-management/preferences"
    };
  }
  rpc UpdateShowcasePreferences(UpdateShowcasePreferencesRequest) returns (fitglue.models.activity.ShowcaseProfile) {
    option (google.api.http) = {
      put: "/v2/users/{user_id}/showcase-management/preferences"
      body: "preferences"
    };
  }
  rpc GenerateShowcaseImages(GenerateShowcaseImagesRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v2/users/{user_id}/showcases/{showcase_id}/generate"
      body: "*"
    };
  }
  rpc GetPublicShowcase(GetPublicShowcaseRequest) returns (fitglue.models.activity.ShowcasedActivity) {
    option (google.api.http) = {
      get: "/v2/public/showcases/{showcase_id}"
    };
  }
  rpc GetPublicShowcaseProfile(GetPublicShowcaseProfileRequest) returns (GetPublicShowcaseProfileResponse) {
    option (google.api.http) = {
      get: "/v2/public/showcase/profile/{slug}"
    };
  }
  rpc GetActivityStats(GetActivityStatsRequest) returns (GetActivityStatsResponse) {
    option (google.api.http) = {
      get: "/v2/users/{user_id}/activities/stats"
    };
  }

  // Showcase Settings Management (profile, entries, picture, slug)
  rpc GetShowcaseSettings(GetShowcaseSettingsRequest) returns (GetShowcaseSettingsResponse) {
    option (google.api.http) = {
      get: "/v2/users/{user_id}/showcase-management/profile"
    };
  }
  rpc UpdateShowcaseSettings(UpdateShowcaseSettingsRequest) returns (fitglue.models.activity.ShowcaseProfile) {
    option (google.api.http) = {
      put: "/v2/users/{user_id}/showcase-management/profile"
      body: "settings"
    };
  }
  rpc UpdateShowcaseSlug(UpdateShowcaseSlugRequest) returns (UpdateShowcaseSlugResponse) {
    option (google.api.http) = {
      put: "/v2/users/{user_id}/showcase-management/profile/slug"
      body: "*"
    };
  }
  rpc AddShowcaseEntry(AddShowcaseEntryRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v2/users/{user_id}/showcase-management/profile/entries/{showcase_id}"
    };
  }
  rpc RemoveShowcaseEntry(RemoveShowcaseEntryRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v2/users/{user_id}/showcase-management/profile/entries/{showcase_id}"
    };
  }
  rpc GetShowcaseProfilePictureUploadUrl(GetShowcaseProfilePictureUploadUrlRequest) returns (GetShowcaseProfilePictureUploadUrlResponse) {
    option (google.api.http) = {
      post: "/v2/users/{user_id}/showcase-management/profile/picture"
      body: "*"
    };
  }
}

message GetActivityRequest {
  string user_id = 1;
  string activity_id = 2;
}

message ListActivitiesRequest {
  string user_id = 1;
  int32 limit = 2;
  string page_token = 3;
}

message ListActivitiesResponse {
  repeated fitglue.models.activity.StandardizedActivity activities = 1;
  string next_page_token = 2;
}

message DeleteActivityRequest {
  string user_id = 1;
  string activity_id = 2;
}

message GetShowcaseRequest {
  string user_id = 1;
  string showcase_id = 2;
}

message ListShowcasesRequest {
  string user_id = 1;
}

message ListShowcasesResponse {
  repeated fitglue.models.activity.ShowcaseProfileEntry showcases = 1;
}

message CreateShowcaseRequest {
  string user_id = 1;
  fitglue.models.activity.ShowcasedActivity showcase = 2;
}

message UpdateShowcaseRequest {
  string user_id = 1;
  string showcase_id = 2;
  fitglue.models.activity.ShowcasedActivity showcase = 3;
}

message DeleteShowcaseRequest {
  string user_id = 1;
  string showcase_id = 2;
}

message ExportDataRequest {
  string user_id = 1;
}

message ExportDataResponse {
  string download_url = 1;
}

message ParseFitFileRequest {
  string user_id = 1;
  bytes fit_file_content = 2;
  string title = 3;
  string description = 4;
  string pipeline_id = 5;
}

message GetShowcasePreferencesRequest {
  string user_id = 1;
}

message UpdateShowcasePreferencesRequest {
  string user_id = 1;
  fitglue.models.activity.ShowcaseProfile preferences = 2;
}

message GenerateShowcaseImagesRequest {
  string user_id = 1;
  string showcase_id = 2;
}

message GetPublicShowcaseRequest {
  string showcase_id = 1;
}

// Showcase Settings Management messages
message GetShowcaseSettingsRequest {
  string user_id = 1;
}

message GetShowcaseSettingsResponse {
  fitglue.models.activity.ShowcaseProfile profile = 1;
  repeated ShowcaseActivityEntry activities = 2;
}

message ShowcaseActivityEntry {
  string showcase_id = 1;
  string title = 2;
  string activity_type = 3;
  string source = 4;
  string start_time = 5;
  string created_at = 6;
  bool in_profile = 7;
}

message UpdateShowcaseSettingsRequest {
  string user_id = 1;
  fitglue.models.activity.ShowcaseProfile settings = 2;
}

message UpdateShowcaseSlugRequest {
  string user_id = 1;
  string slug = 2;
}

message UpdateShowcaseSlugResponse {
  string slug = 1;
}

message AddShowcaseEntryRequest {
  string user_id = 1;
  string showcase_id = 2;
}

message RemoveShowcaseEntryRequest {
  string user_id = 1;
  string showcase_id = 2;
}

message GetShowcaseProfilePictureUploadUrlRequest {
  string user_id = 1;
  string content_type = 2;
}

message GetShowcaseProfilePictureUploadUrlResponse {
  string upload_url = 1;
  string public_url = 2;
  string content_type = 3;
  int64 max_size_bytes = 4;
}

message GetPublicShowcaseProfileRequest {
  string slug = 1;
  int32 page = 2;
}

message GetPublicShowcaseProfileResponse {
  fitglue.models.activity.ShowcaseProfile profile = 1;
  repeated fitglue.models.activity.ShowcasedActivity showcases = 2;
  int32 total_pages = 3;
  int32 current_page = 4;
}

message GetActivityStatsRequest {
  string user_id = 1;
}

message GetActivityStatsResponse {
  int32 total_activities = 1;
  int32 total_showcases = 2;
  string last_activity_at = 3;
}
