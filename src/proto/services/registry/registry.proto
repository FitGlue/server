syntax = "proto3";

package fitglue.services.registry;

import "google/api/annotations.proto";
import "models/plugin/manifest.proto";

option go_package = "github.com/fitglue/server/src/go/pkg/types/pb/services/registry";

service RegistryService {
  rpc ListPlugins(ListPluginsRequest) returns (ListPluginsResponse) {
    option (google.api.http) = {
      get: "/v2/registry/plugins"
    };
  }
  rpc GetPlugin(GetPluginRequest) returns (fitglue.models.plugin.PluginManifest) {
    option (google.api.http) = {
      get: "/v2/registry/plugins/{plugin_id}"
    };
  }
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse) {
    option (google.api.http) = {
      get: "/v2/registry/categories"
    };
  }
  rpc GetPluginIcon(GetPluginIconRequest) returns (GetPluginIconResponse) {
    option (google.api.http) = {
      get: "/v2/registry/plugins/{plugin_id}/icon"
    };
  }
  rpc ListSources(ListSourcesRequest) returns (ListSourcesResponse) {
    option (google.api.http) = {
      get: "/v2/registry/sources"
    };
  }
  rpc ListDestinations(ListDestinationsRequest) returns (ListDestinationsResponse) {
    option (google.api.http) = {
      get: "/v2/registry/destinations"
    };
  }
}

message ListPluginsRequest {
  string category = 1;
}

message ListPluginsResponse {
  repeated fitglue.models.plugin.PluginManifest plugins = 1;
}

message GetPluginRequest {
  string plugin_id = 1;
}

message ListCategoriesRequest {}

message ListCategoriesResponse {
  repeated string categories = 1;
}

message GetPluginIconRequest {
  string plugin_id = 1;
}

message GetPluginIconResponse {
  bytes icon_data = 1;
  string content_type = 2;
}

message ListSourcesRequest {}

message ListSourcesResponse {
  repeated fitglue.models.plugin.PluginManifest sources = 1;
}

message ListDestinationsRequest {}

message ListDestinationsResponse {
  repeated fitglue.models.plugin.PluginManifest destinations = 1;
}
