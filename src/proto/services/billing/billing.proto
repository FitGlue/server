syntax = "proto3";

package fitglue.services.billing;

import "google/protobuf/empty.proto";
import "google/api/annotations.proto";
import "models/user/billing.proto";
import "models/user/profile.proto";

option go_package = "github.com/fitglue/server/src/go/pkg/types/pb/services/billing";

service BillingService {
  rpc GetSubscription(GetSubscriptionRequest) returns (fitglue.models.user.SubscriptionState) {
    option (google.api.http) = {
      get: "/v2/users/{user_id}/billing/subscription"
    };
  }
  rpc CreateCheckoutSession(CreateCheckoutSessionRequest) returns (CreateCheckoutSessionResponse) {
    option (google.api.http) = {
      post: "/v2/users/{user_id}/billing/checkout"
      body: "*"
    };
  }
  rpc HandleWebhookEvent(HandleWebhookEventRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v2/billing/webhook"
      body: "*"
    };
  }
  rpc GetTierStatus(GetTierStatusRequest) returns (GetTierStatusResponse) {
    option (google.api.http) = {
      get: "/v2/users/{user_id}/billing/tier-status"
    };
  }
  rpc StartTrial(StartTrialRequest) returns (fitglue.models.user.SubscriptionState) {
    option (google.api.http) = {
      post: "/v2/users/{user_id}/billing/trial"
      body: "*"
    };
  }
  rpc CancelSubscription(CancelSubscriptionRequest) returns (fitglue.models.user.SubscriptionState) {
    option (google.api.http) = {
      post: "/v2/users/{user_id}/billing/cancel"
      body: "*"
    };
  }
}

message GetSubscriptionRequest {
  string user_id = 1;
}

message CreateCheckoutSessionRequest {
  string user_id = 1;
  string success_url = 2;
  string cancel_url = 3;
}

message CreateCheckoutSessionResponse {
  string session_url = 1;
}

message HandleWebhookEventRequest {
  bytes payload = 1;
  string signature = 2;
}

message GetTierStatusRequest {
  string user_id = 1;
}

message GetTierStatusResponse {
  fitglue.models.user.UserTier effective_tier = 1;
  bool is_trial = 2;
}

message StartTrialRequest {
  string user_id = 1;
}

message CancelSubscriptionRequest {
  string user_id = 1;
}
