components:
    schemas:
        AppleHealthIntegration:
            type: object
            properties:
                enabled:
                    type: boolean
                createdAt:
                    type: string
                    format: date-time
                lastUsedAt:
                    type: string
                    format: date-time
        BoosterExecution:
            type: object
            properties:
                providerName:
                    type: string
                status:
                    type: string
                durationMs:
                    type: string
                metadata:
                    type: object
                    additionalProperties:
                        type: string
                error:
                    type: string
        ConfigFieldDependency:
            type: object
            properties:
                fieldKey:
                    type: string
                values:
                    type: array
                    items:
                        type: string
        ConfigFieldOption:
            type: object
            properties:
                value:
                    type: string
                label:
                    type: string
        ConfigFieldSchema:
            type: object
            properties:
                key:
                    type: string
                label:
                    type: string
                description:
                    type: string
                fieldType:
                    enum:
                        - CONFIG_FIELD_TYPE_UNSPECIFIED
                        - CONFIG_FIELD_TYPE_STRING
                        - CONFIG_FIELD_TYPE_NUMBER
                        - CONFIG_FIELD_TYPE_BOOLEAN
                        - CONFIG_FIELD_TYPE_SELECT
                        - CONFIG_FIELD_TYPE_MULTI_SELECT
                        - CONFIG_FIELD_TYPE_KEY_VALUE_MAP
                        - CONFIG_FIELD_TYPE_DYNAMIC_SELECT
                    type: string
                    format: enum
                required:
                    type: boolean
                defaultValue:
                    type: string
                options:
                    type: array
                    items:
                        $ref: '#/components/schemas/ConfigFieldOption'
                validation:
                    $ref: '#/components/schemas/ConfigFieldValidation'
                dependsOn:
                    $ref: '#/components/schemas/ConfigFieldDependency'
                keyOptions:
                    type: array
                    items:
                        $ref: '#/components/schemas/ConfigFieldOption'
                valueOptions:
                    type: array
                    items:
                        $ref: '#/components/schemas/ConfigFieldOption'
                dynamicSource:
                    type: string
                valueDynamicSource:
                    type: string
        ConfigFieldValidation:
            type: object
            properties:
                minLength:
                    type: integer
                    format: int32
                maxLength:
                    type: integer
                    format: int32
                pattern:
                    type: string
                minValue:
                    type: number
                    format: double
                maxValue:
                    type: number
                    format: double
        ConnectionActionGatewayRequest:
            type: object
            properties:
                provider:
                    type: string
                action:
                    type: string
        Counter:
            type: object
            properties:
                id:
                    type: string
                count:
                    type: string
                lastUpdated:
                    type: string
                    format: date-time
        CreateBillingPortalGatewayRequest:
            type: object
            properties:
                returnUrl:
                    type: string
        CreateBillingPortalGatewayResponse:
            type: object
            properties:
                url:
                    type: string
        CreateCheckoutGatewayRequest:
            type: object
            properties:
                successUrl:
                    type: string
                cancelUrl:
                    type: string
            description: Billing
        CreateCheckoutGatewayResponse:
            type: object
            properties:
                sessionUrl:
                    type: string
        CreatePipelineGatewayRequest:
            type: object
            properties:
                pipeline:
                    $ref: '#/components/schemas/PipelineConfig'
        CreateShowcaseGatewayRequest:
            type: object
            properties:
                showcase:
                    $ref: '#/components/schemas/ShowcasedActivity'
        DestinationConfig:
            type: object
            properties:
                config:
                    type: object
                    additionalProperties:
                        type: string
                excludedEnrichers:
                    type: array
                    items:
                        type: string
        DestinationOutcome:
            type: object
            properties:
                destination:
                    enum:
                        - DESTINATION_UNSPECIFIED
                        - DESTINATION_STRAVA
                        - DESTINATION_SHOWCASE
                        - DESTINATION_HEVY
                        - DESTINATION_TRAININGPEAKS
                        - DESTINATION_INTERVALS
                        - DESTINATION_GOOGLESHEETS
                        - DESTINATION_GITHUB
                        - DESTINATION_MOCK
                    type: string
                    format: enum
                status:
                    enum:
                        - DESTINATION_STATUS_UNSPECIFIED
                        - DESTINATION_STATUS_PENDING
                        - DESTINATION_STATUS_SUCCESS
                        - DESTINATION_STATUS_FAILED
                        - DESTINATION_STATUS_SKIPPED
                    type: string
                    format: enum
                externalId:
                    type: string
                error:
                    type: string
                completedAt:
                    type: string
                    format: date-time
        EnricherConfig:
            type: object
            properties:
                providerType:
                    enum:
                        - ENRICHER_PROVIDER_UNSPECIFIED
                        - ENRICHER_PROVIDER_FITBIT_HEART_RATE
                        - ENRICHER_PROVIDER_WORKOUT_SUMMARY
                        - ENRICHER_PROVIDER_MUSCLE_HEATMAP
                        - ENRICHER_PROVIDER_SOURCE_LINK
                        - ENRICHER_PROVIDER_VIRTUAL_GPS
                        - ENRICHER_PROVIDER_TYPE_MAPPER
                        - ENRICHER_PROVIDER_PARKRUN
                        - ENRICHER_PROVIDER_CONDITION_MATCHER
                        - ENRICHER_PROVIDER_AUTO_INCREMENT
                        - ENRICHER_PROVIDER_USER_INPUT
                        - ENRICHER_PROVIDER_ACTIVITY_FILTER
                        - ENRICHER_PROVIDER_LOGIC_GATE
                        - ENRICHER_PROVIDER_HEART_RATE_SUMMARY
                        - ENRICHER_PROVIDER_AI_COMPANION
                        - ENRICHER_PROVIDER_PACE_SUMMARY
                        - ENRICHER_PROVIDER_CADENCE_SUMMARY
                        - ENRICHER_PROVIDER_POWER_SUMMARY
                        - ENRICHER_PROVIDER_SPEED_SUMMARY
                        - ENRICHER_PROVIDER_PERSONAL_RECORDS
                        - ENRICHER_PROVIDER_TRAINING_LOAD
                        - ENRICHER_PROVIDER_SPOTIFY_TRACKS
                        - ENRICHER_PROVIDER_WEATHER
                        - ENRICHER_PROVIDER_ELEVATION_SUMMARY
                        - ENRICHER_PROVIDER_LOCATION_NAMING
                        - ENRICHER_PROVIDER_MUSCLE_HEATMAP_IMAGE
                        - ENRICHER_PROVIDER_ROUTE_THUMBNAIL
                        - ENRICHER_PROVIDER_AI_BANNER
                        - ENRICHER_PROVIDER_FIT_FILE_HEART_RATE
                        - ENRICHER_PROVIDER_HYBRID_RACE_TAGGER
                        - ENRICHER_PROVIDER_RUNNING_DYNAMICS
                        - ENRICHER_PROVIDER_HEART_RATE_ZONES
                        - ENRICHER_PROVIDER_CALORIES_BURNED
                        - ENRICHER_PROVIDER_GOAL_TRACKER
                        - ENRICHER_PROVIDER_STREAK_TRACKER
                        - ENRICHER_PROVIDER_DISTANCE_MILESTONES
                        - ENRICHER_PROVIDER_RECOVERY_ADVISOR
                        - ENRICHER_PROVIDER_EFFORT_SCORE
                        - ENRICHER_PROVIDER_INTERVALS
                        - ENRICHER_PROVIDER_MOCK
                    type: string
                    format: enum
                typedConfig:
                    type: object
                    additionalProperties:
                        type: string
